name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-android-linux:
    name: Build Android and Linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 29
        run: |
          echo "y" | sdkmanager --install "ndk;29.0.14206865"
          echo "y" | sdkmanager --licenses

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi, aarch64-linux-android, i686-linux-android, x86_64-linux-android

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Build Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6
          flutter build linux --release
          cd build/linux/x64/release/bundle
          zip -r ../../../../../sharebeam-linux.zip .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-linux-artifacts
          path: |
            build/app/outputs/flutter-apk/app-*-release.apk
            sharebeam-linux.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: |
          flutter build windows --release
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath sharebeam-windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: sharebeam-windows.zip

  release:
    name: Create Release
    needs: [build-android-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | sed 's/+/./g')
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*.apk, artifacts/*.zip"
          tag: "${{ steps.get_version.outputs.version }}.${{ github.run_number }}"
          name: "Release ${{ steps.get_version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            Automated build of Sharebeam. 
            
            Downloads:
            - Android: APK files
            - Linux: .zip bundle
            - Windows: .zip bundle (Untested, experimental)
            
            Note: The Windows build is currently untested and may contain bugs.
          token: ${{ secrets.GITHUB_TOKEN }}